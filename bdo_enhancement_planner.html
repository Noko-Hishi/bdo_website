
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f1a;--panel:#141624;--panel2:#1c1e30;--border:#2a2d42;
  --text:#c8d0e8;--sub:#5a6080;--gold:#f0c060;--accent:#9b6fff;
  --kara-neck:#e08040;--kara:#f0a060;--kunnou-m:#50c878;--kunnou-s:#3aa860;
  --green:#50c878;--red:#e06060;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;min-height:100vh}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}

.sidebar{background:var(--panel);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}

.top-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.top-bar .logo{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:1px}
.top-bar .sub{font-size:11px;color:var(--sub)}

.right-panel{display:flex;flex-direction:column}
.content{padding:16px;flex:1;overflow:auto}

.section-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}

.price-grid{display:grid;grid-template-columns:1fr auto;gap:6px 8px;align-items:center}
.price-label{font-size:12px;color:var(--text)}
.price-input{background:var(--panel2);border:1px solid var(--border);color:var(--gold);font-family:'Share Tech Mono',monospace;font-size:13px;padding:4px 8px;border-radius:4px;width:80px;text-align:right;outline:none}
.price-input:focus{border-color:var(--accent)}
.unit{font-size:11px;color:var(--sub);grid-column:2;text-align:right;margin-top:-4px}

.checkbox-row{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer}
.checkbox-row input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
.checkbox-row label{font-size:12px;cursor:pointer;color:var(--text)}

.slot-table{width:100%;border-collapse:collapse}
.slot-table th{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
.slot-table td{padding:5px 6px;border-bottom:1px solid rgba(42,45,66,0.5)}
.slot-name{font-size:12px}
.kara-neck .slot-name{color:var(--kara-neck)}
.kara .slot-name{color:var(--kara)}
.kunnou-m .slot-name{color:var(--kunnou-m)}
.kunnou-s .slot-name{color:var(--kunnou-s)}

select.challe-sel{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:3px 4px;border-radius:4px;outline:none;width:70px}
select.challe-sel:focus{border-color:var(--accent)}
.stack-val{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--gold);text-align:center;min-width:36px}

.calc-btn{background:var(--accent);color:#fff;border:none;padding:10px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;width:100%;letter-spacing:0.5px;transition:background 0.15s}
.calc-btn:hover{background:#8555ee}
.calc-btn:active{background:#7040d0}

.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.result-title{font-size:14px;font-weight:700;color:var(--accent)}
.hint{font-size:11px;color:var(--sub)}

table.results{width:100%;border-collapse:collapse;font-size:12px}
table.results th{background:var(--panel2);padding:8px 10px;text-align:center;font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--border);white-space:nowrap}
table.results th:first-child{text-align:center;width:40px}
table.results th:nth-child(2){text-align:left}
table.results td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;transition:background 0.1s}
table.results td:nth-child(2){text-align:left}
table.results tr:hover td{background:rgba(155,111,255,0.05);cursor:pointer}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700}
.rank-1{background:#d4af37;color:#000}
.rank-2{background:#a8a9ad;color:#000}
.rank-3{background:#cd7f32;color:#000}
.rank-n{background:var(--border);color:var(--sub)}
.mono{font-family:'Share Tech Mono',monospace}
.eff-bar{height:4px;border-radius:2px;background:var(--accent);margin-top:3px;min-width:2px}
.empty-msg{text-align:center;padding:40px;color:var(--sub);font-size:13px}
.tag-kara-neck{color:var(--kara-neck)}
.tag-kara{color:var(--kara)}
.tag-kunnou-m{color:var(--kunnou-m)}
.tag-kunnou-s{color:var(--kunnou-s)}
</style>

<h2 class="sr-only">黒い砂漠 強化プランナー — スロットごとの強化効率を計算するツール</h2>

<div class="app">
  <div class="sidebar">
    <div>
      <div class="section-title">素材単価 (M)</div>
      <div class="price-grid">
        <span class="price-label">精髄 (カラザド)</span>
        <input class="price-input" id="p-kara" value="50" type="number" min="0">
        <span></span><span class="unit">M</span>
        <span class="price-label">太初 (君王)</span>
        <input class="price-input" id="p-kunnou" value="60" type="number" min="0">
        <span></span><span class="unit">M</span>
        <span class="price-label">クロン</span>
        <input class="price-input" id="p-cron" value="3" type="number" min="0">
        <span></span><span class="unit">M</span>
      </div>
    </div>
    <div>
      <div class="section-title">オプション</div>
      <div class="checkbox-row">
        <input type="checkbox" id="use-kakusei">
        <label for="use-kakusei">君王覚醒スロットを使う</label>
      </div>
    </div>
    <div style="flex:1">
      <div class="section-title">現在の装備段階</div>
      <table class="slot-table">
        <thead>
          <tr>
            <th>スロット</th>
            <th style="text-align:center">段階</th>
            <th style="text-align:center">次SP</th>
          </tr>
        </thead>
        <tbody id="slot-tbody"></tbody>
      </table>
    </div>
    <button class="calc-btn" onclick="calculate()">▶ コスパ計算</button>
  </div>
  <div class="right-panel">
    <div class="content">
      <div class="result-header">
        <span class="result-title">コスパ順 強化候補</span>
        <span class="hint">💡 行をクリックで完了 → 次チャレへ</span>
      </div>
      <div id="result-area"><div class="empty-msg">左パネルで設定後、「コスパ計算」を押してください</div></div>
    </div>
  </div>
</div>

<script>
const CHALLENGES = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

const KARAZAD = [
  ["I",    40,  1.38,  1,    0,  3],
  ["II",   60,  1.96,  2,  120,  5],
  ["III",  90,  2.19,  3,  280,  7],
  ["IV",  130,  2.47,  4,  540,  8],
  ["V",   170,  2.91,  6,  840, 10],
  ["VI",  200,  3.69,  8, 1090, 12],
  ["VII", 230,  4.73, 10, 1480, 15],
  ["VIII",260,  6.50, 12, 1880, 20],
  ["IX",  280, 10.78, 15, 2850, 25],
  ["X",   300, 18.75,  0, 3650, 30],
];

const KUNNOU = [
  ["I",    60,   1.67, 1,    0,   3],
  ["II",   75,   2.86, 1,  320,   5],
  ["III",  90,   5.00, 1,  560,  10],
  ["IV",  100,   9.99, 1,  780,  20],
  ["V",   150,  13.33, 1,  970,  30],
  ["VI",  210,  16.65, 1, 1350,  35],
  ["VII", 240,  25.00, 1, 1550,  50],
  ["VIII",270,  33.22, 1, 2250,  75],
  ["IX",  300,  66.51, 1, 2760, 165],
  ["X",   300, 133.30, 1, 3920, 330],
];

const BASE_SLOTS = [
  {id:"kara_neck",  name:"カラザド首",      atk:20, data:KARAZAD, cls:"kara-neck"},
  {id:"kara_body",  name:"カラザド胴",       atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ring1", name:"カラザド指①",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ring2", name:"カラザド指②",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ear1",  name:"カラザド耳①",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ear2",  name:"カラザド耳②",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kunnou_main",name:"君王メイン/覚醒",  atk:19, data:KUNNOU,  cls:"kunnou-m"},
  {id:"kunnou_sub", name:"君王補助",          atk:10, data:KUNNOU,  cls:"kunnou-s"},
];
const KAKUSEI_SLOT = {id:"kunnou_kaku",name:"君王覚醒(伝承)",atk:1,data:KUNNOU,cls:"kunnou-m"};

let slotState = {}; // id -> {level: -1..9}

function getSlots(){
  const slots = [...BASE_SLOTS];
  if(document.getElementById('use-kakusei').checked) slots.push(KAKUSEI_SLOT);
  return slots;
}

function getDefaultStack(data, idx){ return data[idx][1]; }

function calcExpected(row, pMat, pCron){
  const [,, expTries, matCount, cronCount, ceilCount] = row;
  const costPer = pMat * matCount + pCron * cronCount;
  return {expTries, expCost: costPer*expTries, ceilCost: costPer*ceilCount};
}

function renderSlots(){
  const slots = getSlots();
  const tbody = document.getElementById('slot-tbody');
  tbody.innerHTML='';
  slots.forEach(s=>{
    if(!slotState[s.id]) slotState[s.id]={level:-1};
    const cur = slotState[s.id].level;
    const nextIdx = cur+1;
    const defStack = nextIdx<10 ? getDefaultStack(s.data, nextIdx) : 0;
    const tr=document.createElement('tr');
    tr.className=s.cls;
    tr.innerHTML=`
      <td><span class="slot-name">${s.name}</span></td>
      <td>
        <select class="challe-sel" data-sid="${s.id}" onchange="onChalleChange('${s.id}')">
          <option value="-1" ${cur===-1?'selected':''}>未強化</option>
          ${CHALLENGES.map((c,i)=>`<option value="${i}" ${cur===i?'selected':''}>${c}</option>`).join('')}
        </select>
      </td>
      <td class="stack-val" id="stk-${s.id}">${nextIdx<10?defStack:'—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function onChalleChange(sid){
  const sel=document.querySelector(`select[data-sid="${sid}"]`);
  const val=parseInt(sel.value);
  slotState[sid]={level:val};
  const slots=getSlots();
  const s=slots.find(x=>x.id===sid);
  if(!s) return;
  const nextIdx=val+1;
  const stk=document.getElementById('stk-'+sid);
  if(stk) stk.textContent = nextIdx<10 ? getDefaultStack(s.data,nextIdx) : '—';
}

function getTag(id){
  if(id==='kara_neck') return 'tag-kara-neck';
  if(id.startsWith('kara')) return 'tag-kara';
  if(id.includes('main')||id.includes('kaku')) return 'tag-kunnou-m';
  return 'tag-kunnou-s';
}

function calculate(){
  const pKara  = parseFloat(document.getElementById('p-kara').value)||0;
  const pKunnou= parseFloat(document.getElementById('p-kunnou').value)||0;
  const pCron  = parseFloat(document.getElementById('p-cron').value)||0;
  const slots  = getSlots();

  const candidates=[];
  slots.forEach(s=>{
    const cur=(slotState[s.id]||{level:-1}).level;
    const nextIdx=cur+1;
    if(nextIdx>=10) return;
    const pMat = s.id.startsWith('kara') ? pKara/1000 : pKunnou/1000;
    const row  = s.data[nextIdx];
    const {expTries,expCost,ceilCost}=calcExpected(row, pMat, pCron/1000);
    const eff = expCost>0 ? s.atk/expCost : 0;
    candidates.push({
      id:s.id, name:s.name, challe:CHALLENGES[nextIdx],
      stack:getDefaultStack(s.data,nextIdx),
      atk:s.atk, expTries, expCost, ceilCost, eff
    });
  });

  candidates.sort((a,b)=>b.eff-a.eff);
  const maxEff=candidates.length ? candidates[0].eff : 1;

  const area=document.getElementById('result-area');
  if(!candidates.length){
    area.innerHTML='<div class="empty-msg">🎉 全スロットがチャレXまで完了しています！</div>';
    return;
  }

  let rows=candidates.map((c,i)=>{
    const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    const barW    = Math.round((c.eff/maxEff)*80);
    const tag     = getTag(c.id);
    return `<tr onclick="advance('${c.id}')">
      <td><span class="rank-badge ${rankCls}">${i+1}</span></td>
      <td class="${tag}">${c.name}</td>
      <td>${c.challe}</td>
      <td class="mono">${c.stack}</td>
      <td class="mono">+${c.atk}</td>
      <td class="mono">${c.expTries.toFixed(1)}</td>
      <td class="mono">${c.expCost.toFixed(3)}</td>
      <td class="mono">${c.ceilCost.toFixed(3)}</td>
      <td>
        <div class="mono" style="font-size:11px">${c.eff.toFixed(4)}</div>
        <div class="eff-bar" style="width:${barW}%"></div>
      </td>
    </tr>`;
  }).join('');

  area.innerHTML=`
    <table class="results">
      <thead>
        <tr>
          <th>順位</th><th>スロット</th><th>チャレ</th><th>スタック</th>
          <th>攻撃</th><th>期待回数</th><th>期待(G)</th><th>天井(G)</th><th>コスパ(/G)</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function advance(sid){
  const s = getSlots().find(x=>x.id===sid);
  if(!s) return;
  const cur=(slotState[sid]||{level:-1}).level;
  if(cur+1>=10) return;
  slotState[sid]={level:cur+1};
  renderSlots();
  calculate();
}

document.getElementById('use-kakusei').addEventListener('change',()=>{
  renderSlots();
});

renderSlots();
</script>
