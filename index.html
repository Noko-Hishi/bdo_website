<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黒い砂漠 - 強化プランナー</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    /* 黒い砂漠：ダークファンタジーパレット */
    --bg-main: #121316;          /* 深い漆黒 */
    --bg-panel: #1a1c21;         /* 石目調を模したベースパネル */
    --bg-panel-light: #23262d;   /* 浮き上がらせるインナーパネル */
    --border-metal: #383b42;     /* 鉄のような鈍い境界線 */
    --border-gold: #b3975d;      /* 酸化したアンティークゴールド */
    --text-normal: #cfd2dc;      /* 基本テキスト */
    --text-dark: #7a7e8a;        /* 補助テキスト */
    --gold-bright: #eec980;      /* 鮮やかなゴールド */
    
    /* 装備スロット固有カラー (視認性とゲーム内カラーの調和) */
    --color-kara-neck: #ff8c42;  /* カラザド首：鮮烈なオレンジ */
    --color-kara: #fca366;       /* カラザド他：柔らかな橙 */
    --color-kunnou-m: #4ef083;   /* 君王メイン：冴えた古代緑 */
    --color-kunnou-s: #3cb371;   /* 君王補助：深緑 */
    
    /* 演出カラー */
    --btn-fire-start: #aa2f1d;
    --btn-fire-end: #57130a;
  }

  body {
    background-color: var(--bg-main);
    color: var(--text-normal);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
    /* 黒い砂漠の背景布のような薄い質感のテクスチャを再現 */
    background-image: 
      radial-gradient(circle at 50% 30%, #1e222b 0%, #121316 70%),
      linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: auto, 4px 4px, 4px 4px;
  }

  /* アプリケーション外枠 */
  .app-window {
    width: 100%;
    max-width: 1260px;
    background: var(--bg-panel);
    border: 1px solid #2e3036;
    outline: 3px solid #111214;
    box-shadow: 0 15px 35px rgba(0,0,0,0.8);
    position: relative;
  }

  /* ゲームウィンドウヘッダー風のバー */
  .window-header {
    background: linear-gradient(90deg, #16171b 0%, #282a33 50%, #16171b 100%);
    border-bottom: 2px solid var(--border-gold);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  .window-header .title {
    font-family: 'Cinzel', 'Noto Sans JP', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold-bright);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(238, 201, 128, 0.3), 2px 2px 2px #000;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .window-header .title::before, .window-header .title::after {
    content: "♦";
    font-size: 12px;
    color: var(--border-gold);
  }

  /* レイアウトコンテナ */
  .app-container {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: 680px;
  }

  /* 左サイドバー (操作・設定エリア) */
  .sidebar {
    background-color: #16171b;
    border-right: 1px solid var(--border-metal);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* 右メインパネル (結果表示エリア) */
  .main-panel {
    padding: 20px;
    display: flex;
    flex-direction: column;
    background: rgba(18, 19, 22, 0.4);
  }

  /* 黒い砂漠風のセクションボックス枠 */
  .section-box {
    background: var(--bg-panel-light);
    border: 1px solid var(--border-metal);
    padding: 14px;
    position: relative;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold-bright);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #33363f;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-title::before {
    content: "";
    display: inline-block;
    width: 3px;
    height: 11px;
    background: var(--border-gold);
  }

  /* 単価入力グリッド */
  .price-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 10px;
    align-items: center;
  }

  .price-label {
    font-size: 12px;
    color: var(--text-normal);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    background: #0f1013;
    border: 1px solid #434754;
    padding-right: 8px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--gold-bright);
    box-shadow: 0 0 5px rgba(238, 201, 128, 0.2);
  }

  .price-input {
    background: transparent;
    border: none;
    color: var(--gold-bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    font-weight: bold;
    padding: 6px 8px;
    width: 80px;
    text-align: right;
    outline: none;
  }

  .unit {
    font-size: 11px;
    color: var(--text-dark);
    font-weight: bold;
  }

  /* チェックボックス */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    color: var(--text-normal);
    font-size: 12px;
  }

  .checkbox-row input {
    accent-color: var(--border-gold);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  /* 装備段階テーブル */
  .slot-table {
    width: 100%;
    border-collapse: collapse;
  }

  .slot-table th {
    font-size: 11px;
    color: var(--text-dark);
    font-weight: bold;
    padding: 4px 6px 8px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border-metal);
  }

  .slot-table td {
    padding: 6px 4px;
    border-bottom: 1px solid #1a1c21;
    vertical-align: middle;
  }

  .slot-name {
    font-size: 12px;
    font-weight: bold;
    text-shadow: 1px 1px 1px #000;
  }

  /* スロット種別毎の色表記定義 */
  .kara-neck .slot-name { color: var(--color-kara-neck); }
  .kara      .slot-name { color: var(--color-kara); }
  .kunnou-m  .slot-name { color: var(--color-kunnou-m); }
  .kunnou-s  .slot-name { color: var(--color-kunnou-s); }

  select.challe-sel {
    background: #111215;
    border: 1px solid #434754;
    color: var(--text-normal);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 6px;
    outline: none;
    width: 85px;
    cursor: pointer;
  }

  select.challe-sel:focus {
    border-color: var(--gold-bright);
  }

  .stack-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: bold;
    color: var(--gold-bright);
    text-align: center;
    text-shadow: 0 0 4px rgba(238, 201, 128, 0.4);
  }

  /* 闇の精霊の火を宿す 巨大強化ボタン */
  .calc-btn {
    background: linear-gradient(180deg, var(--btn-fire-start) 0%, var(--btn-fire-end) 100%);
    border: 1px solid #c94632;
    outline: 1px solid #000;
    color: #fff;
    padding: 14px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    letter-spacing: 1px;
    text-shadow: 1px 1px 3px #000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: filter 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .calc-btn:hover {
    filter: brightness(1.2);
  }

  .calc-btn:active {
    transform: translateY(1px);
    filter: brightness(0.9);
  }

  /* 計算結果ヘッダー */
  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border-metal);
    padding-bottom: 6px;
  }

  .result-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold-bright);
    letter-spacing: 0.5px;
  }

  .hint {
    font-size: 11px;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* メインリザルトテーブル */
  .table-scroll {
    overflow-y: auto;
    flex: 1;
    border: 1px solid var(--border-metal);
    background: #141519;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
  }

  table.results {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  table.results th {
    background: #1d1e24;
    color: var(--gold-bright);
    font-size: 11px;
    font-weight: bold;
    padding: 10px 8px;
    text-align: center;
    border-bottom: 2px solid var(--border-metal);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  table.results th:nth-child(2) { text-align: left; }

  table.results td {
    padding: 10px 8px;
    border-bottom: 1px solid #1c1d24;
    text-align: center;
    color: var(--text-normal);
  }

  table.results td:nth-child(2) { text-align: left; }

  /* ホバー時にゲーム内のアイテムスロットを選択したような淡い光を灯す */
  table.results tr:hover td {
    background: rgba(238, 201, 128, 0.06);
    border-bottom-color: rgba(238, 201, 128, 0.2);
    cursor: pointer;
  }

  /* 順位バッジ */
  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .rank-1 { background: linear-gradient(135deg, #eec980, #b3975d); color: #111; border-color: #fff; text-shadow: none; }
  .rank-2 { background: linear-gradient(135deg, #b0b5c2, #6d7280); color: #111; border-color: #fff; text-shadow: none; }
  .rank-3 { background: linear-gradient(135deg, #cc8352, #8c4e2b); color: #fff; }
  .rank-n { background: #252730; color: var(--text-dark); }

  .mono {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
  }
  
  .td-bold {
    font-weight: bold;
  }

  /* 効率バーを黒い砂漠の経験値/強化エネルギー蓄積ゲージ調に */
  .eff-bar-container {
    background: #0b0c0e;
    border: 1px solid #2d3038;
    height: 6px;
    width: 100%;
    margin-top: 4px;
    border-radius: 1px;
  }

  .eff-bar {
    height: 100%;
    background: linear-gradient(90deg, #9650ee 0%, #ca80ff 100%);
    box-shadow: 0 0 6px rgba(202, 128, 255, 0.6);
    min-width: 1px;
  }

  .empty-msg {
    text-align: center;
    padding: 60px;
    color: var(--text-dark);
    font-size: 13px;
  }

  /* コスト・スロット種別テキスト用のカラーオーバーライド */
  .tag-kara-neck { color: var(--color-kara-neck) !important; }
  .tag-kara      { color: var(--color-kara) !important; }
  .tag-kunnou-m  { color: var(--color-kunnou-m) !important; }
  .tag-kunnou-s  { color: var(--color-kunnou-s) !important; }

  /* スクロールバーのゲーム風カスタム */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: #0f1013;
  }
  ::-webkit-scrollbar-thumb {
    background: #383b42;
    border: 1px solid #1a1c21;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--border-gold);
  }
  </style>
</head>
<body>

<div class="app-window">
  <div class="window-header">
    <div class="title">BLACK DESERT - ENHANCEMENT PLANNER</div>
  </div>

  <div class="app-container">
    <div class="sidebar">
      
      <div class="section-box">
        <div class="section-title">MATERIAL PRICES (M)</div>
        <div class="price-grid">
          <span class="price-label">夜明けの精髄 (カラザド素材)</span>
          <div class="input-wrapper">
            <input class="price-input" id="p-kara" value="50" type="number" min="0">
            <span class="unit">M</span>
          </div>
          
          <span class="price-label">太初のブラックストーン (君王素材)</span>
          <div class="input-wrapper">
            <input class="price-input" id="p-kunnou" value="60" type="number" min="0">
            <span class="unit">M</span>
          </div>
          
          <span class="price-label">クロン石</span>
          <div class="input-wrapper">
            <input class="price-input" id="p-cron" value="3" type="number" min="0">
            <span class="unit">M</span>
          </div>
        </div>
      </div>

      <div class="section-box">
        <div class="section-title">OPTIONS</div>
        <div class="checkbox-row">
          <input type="checkbox" id="use-kakusei">
          <label for="use-kakusei">君王覚醒スロットを使用する</label>
        </div>
      </div>

      <div class="section-box" style="flex: 1; display: flex; flex-direction: column;">
        <div class="section-title">EQUIPMENT JOURNAL</div>
        <div style="flex: 1; overflow-y: auto; padding-right: 2px;">
          <table class="slot-table">
            <thead>
              <tr>
                <th>スロット</th>
                <th style="text-align:center; width: 95px;">現在の段階</th>
                <th style="text-align:center; width: 50px;">スタック</th>
              </tr>
            </thead>
            <tbody id="slot-tbody"></tbody>
          </table>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">⚔ 強化効率計算 ⚔</button>
    </div>

    <div class="main-panel">
      <div class="result-header">
        <span class="result-title">EFFICIENT REINFORCEMENT OPPORTUNITIES</span>
        <span class="hint">💡 行をクリックすると、その強化が成功したとして段階を次に進めます。</span>
      </div>
      
      <div class="table-scroll" id="result-area">
        <div class="empty-msg">左側の条件を確認し、「効率強化ルートを算出」を実行してください。</div>
      </div>
    </div>
  </div>
</div>

<script>
// --- ロジックコアデータ群 (完全移植) ---
const CHALLENGES = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

const KARAZAD = [
  ["I",    40,  1.38,  1,    0,  3],
  ["II",   60,  1.96,  2,  120,  5],
  ["III",  90,  2.19,  3,  280,  7],
  ["IV",  130,  2.47,  4,  540,  8],
  ["V",   170,  2.91,  6,  840, 10],
  ["VI",  200,  3.69,  8, 1090, 12],
  ["VII", 230,  4.73, 10, 1480, 15],
  ["VIII",260,  6.50, 12, 1880, 20],
  ["IX",  280, 10.78, 15, 2850, 25],
  ["X",   300, 18.75,  0, 3650, 30],
];

const KUNNOU = [
  ["I",    60,   1.67, 1,    0,   3],
  ["II",   75,   2.86, 1,  320,   5],
  ["III",  90,   5.00, 1,  560,  10],
  ["IV",  100,   9.99, 1,  780,  20],
  ["V",   150,  13.33, 1,  970,  30],
  ["VI",  210,  16.65, 1, 1350,  35],
  ["VII", 240,  25.00, 1, 1550,  50],
  ["VIII",270,  33.22, 1, 2250,  75],
  ["IX",  300,  66.51, 1, 2760, 165],
  ["X",   300, 133.30, 1, 3920, 330],
];

const BASE_SLOTS = [
  {id:"kara_neck",  name:"カラザド首",      atk:20, data:KARAZAD, cls:"kara-neck"},
  {id:"kara_body",  name:"カラザド胴",       atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ring1", name:"カラザド指①",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ring2", name:"カラザド指②",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ear1",  name:"カラザド耳①",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kara_ear2",  name:"カラザド耳②",      atk:9,  data:KARAZAD, cls:"kara"},
  {id:"kunnou_main",name:"君王メイン/覚醒",  atk:19, data:KUNNOU,  cls:"kunnou-m"},
  {id:"kunnou_sub", name:"君王補助",          atk:10, data:KUNNOU,  cls:"kunnou-s"},
];
const KAKUSEI_SLOT = {id:"kunnou_kaku",name:"君王覚醒(伝承)",atk:1,data:KUNNOU,cls:"kunnou-m"};

let slotState = {}; 

function getSlots(){
  const slots = [...BASE_SLOTS];
  if(document.getElementById('use-kakusei').checked) slots.push(KAKUSEI_SLOT);
  return slots;
}

function getDefaultStack(data, idx){ return data[idx][1]; }

function calcExpected(row, pMat, pCron){
  const [,, expTries, matCount, cronCount, ceilCount] = row;
  const costPer = pMat * matCount + pCron * cronCount;
  return {expTries, expCost: costPer*expTries, ceilCost: costPer*ceilCount};
}

// 左サイドの入力リスト描画
function renderSlots(){
  const slots = getSlots();
  const tbody = document.getElementById('slot-tbody');
  tbody.innerHTML='';
  slots.forEach(s=>{
    if(!slotState[s.id]) slotState[s.id]={level:-1};
    const cur = slotState[s.id].level;
    const nextIdx = cur+1;
    const defStack = nextIdx<10 ? getDefaultStack(s.data, nextIdx) : 0;
    const tr=document.createElement('tr');
    tr.className=s.cls;
    tr.innerHTML=`
      <td><span class="slot-name">${s.name}</span></td>
      <td style="text-align:center">
        <select class="challe-sel" data-sid="${s.id}" onchange="onChalleChange('${s.id}')">
          <option value="-1" ${cur===-1?'selected':''}>未強化</option>
          ${CHALLENGES.map((c,i)=>`<option value="${i}" ${cur===i?'selected':''}>${c}</option>`).join('')}
        </select>
      </td>
      <td class="stack-val" id="stk-${s.id}">${nextIdx<10?defStack:'—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function onChalleChange(sid){
  const sel=document.querySelector(`select[data-sid="${sid}"]`);
  const val=parseInt(sel.value);
  slotState[sid]={level:val};
  const slots=getSlots();
  const s=slots.find(x=>x.id===sid);
  if(!s) return;
  const nextIdx=val+1;
  const stk=document.getElementById('stk-'+sid);
  if(stk) stk.textContent = nextIdx<10 ? getDefaultStack(s.data,nextIdx) : '—';
}

function getTag(id){
  if(id==='kara_neck') return 'tag-kara-neck';
  if(id.startsWith('kara')) return 'tag-kara';
  if(id.includes('main')||id.includes('kaku')) return 'tag-kunnou-m';
  return 'tag-kunnou-s';
}

// コスパソート・期待値計算ロジック
function calculate(){
  const pKara  = parseFloat(document.getElementById('p-kara').value)||0;
  const pKunnou= parseFloat(document.getElementById('p-kunnou').value)||0;
  const pCron  = parseFloat(document.getElementById('p-cron').value)||0;
  const slots  = getSlots();

  const candidates=[];
  slots.forEach(s=>{
    const cur=(slotState[s.id]||{level:-1}).level;
    const nextIdx=cur+1;
    if(nextIdx>=10) return;
    const pMat = s.id.startsWith('kara') ? pKara/1000 : pKunnou/1000;
    const row  = s.data[nextIdx];
    const {expTries,expCost,ceilCost}=calcExpected(row, pMat, pCron/1000);
    const eff = expCost>0 ? s.atk/expCost : 0;
    candidates.push({
      id:s.id, name:s.name, challe:CHALLENGES[nextIdx],
      stack:getDefaultStack(s.data,nextIdx),
      atk:s.atk, expTries, expCost, ceilCost, eff
    });
  });

  candidates.sort((a,b)=>b.eff-a.eff);
  const maxEff=candidates.length ? candidates[0].eff : 1;

  const area=document.getElementById('result-area');
  if(!candidates.length){
    area.innerHTML='<div class="empty-msg">🎉 全スロットの強化段階が最大(チャレX)に達しました！</div>';
    return;
  }

  let rows=candidates.map((c,i)=>{
    const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    const barW    = Math.round((c.eff/maxEff)*100);
    const tag     = getTag(c.id);
    return `<tr onclick="advance('${c.id}')">
      <td><span class="rank-badge ${rankCls}">${i+1}</span></td>
      <td class="${tag}" style="font-weight:bold;">${c.name}</td>
      <td class="td-bold">${c.challe}</td>
      <td class="mono td-bold" style="color:var(--gold-bright);">${c.stack}</td>
      <td class="mono td-bold">+${c.atk}</td>
      <td class="mono">${c.expTries.toFixed(1)}</td>
      <td class="mono">${c.expCost.toFixed(3)}</td>
      <td class="mono">${c.ceilCost.toFixed(3)}</td>
      <td>
        <div class="mono td-bold" style="font-size:12px; color:var(--gold-bright);">${c.eff.toFixed(4)}</div>
        <div class="eff-bar-container">
          <div class="eff-bar" style="width:${barW}%"></div>
        </div>
      </td>
    </tr>`;
  }).join('');

  area.innerHTML=`
    <table class="results">
      <thead>
        <tr>
          <th style="width:50px;">順位</th>
          <th style="width:140px; text-align:left;">部位</th>
          <th style="width:65px;">次段階</th>
          <th style="width:70px;">スタック</th>
          <th style="width:75px;">AP上昇値</th>
          <th style="width:75px;">期待回数</th>
          <th style="width:95px;">期待値(G)</th>
          <th style="width:95px;">天井価格(G)</th>
          <th>強化コスパ</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// 行クリックで段階を進める
function advance(sid){
  const s = getSlots().find(x=>x.id===sid);
  if(!s) return;
  const cur=(slotState[sid]||{level:-1}).level;
  if(cur+1>=10) return;
  slotState[sid]={level:cur+1};
  renderSlots();
  calculate();
}

document.getElementById('use-kakusei').addEventListener('change',()=>{
  renderSlots();
});

// 初期リファレンス呼び出し
renderSlots();
</script>
